<!-- html.to.design → HTML 칸에만 붙여넣기 (CSS는 .css 파일 참고) -->
<div class="shell">
  <header class="header" aria-label="Workspace header">
    <div class="header-row r1">
      <div class="brand-box">
        <div class="brand-dot" aria-hidden="true"></div>
        <span class="brand-txt">Safetics</span>
      </div>
      <div class="process-field">
        <span>목업: EV 배터리 팩 조립 라인 01</span>
      </div>
      <div class="header-spacer"></div>
      <div class="ui-mode"><span>☀ 라이트</span><span>▾</span></div>
      <div class="icon-btn" title="Scene info"></div>
      <div class="icon-btn" title="Comment"></div>
      <div class="icon-btn" title="Share"></div>
      <div class="plan-btn"><span>✦</span> 플랜</div>
      <div class="icon-btn" title="My page"></div>
      <div class="icon-btn" title="Language"></div>
    </div>
    <div class="header-row r2">
      <div class="tool-3 on" title="Menu"></div>
      <div class="tool-3" title="Undo"></div>
      <div class="tool-3" title="Redo"></div>
      <div class="view-tools">
        <div class="view-ic"></div>
        <div class="view-ic on"></div>
        <div class="view-ic"></div>
        <div class="view-ic"></div>
        <div class="view-ic"></div>
        <div class="view-ic"></div>
        <div class="view-ic"></div>
        <div class="view-ic"></div>
      </div>
      <div class="primary-analysis">Analysis</div>
    </div>
  </header>

  <nav class="gnb" aria-label="Left GNB">
    <div class="gnb-btn"></div>
    <div class="gnb-btn on"></div>
    <div class="gnb-btn"></div>
    <div class="gnb-btn"></div>
    <div class="gnb-btn"></div>
  </nav>

  <main class="main">
    <p class="main-note">App: bg-viewport.png object-cover (placeholder gradient)</p>
  </main>

  <div class="edge-toggle" title="좌측 패널 토글"></div>

  <div class="bottom-dock">
    <div class="expand-tl"></div>
    <div class="transport">
      <div class="t-dot"></div>
      <div class="t-dot"></div>
      <span class="t-time">00:00.0/04:07.1</span>
      <span class="t-rate">x 1.0 ▾</span>
      <div class="t-scrub"></div>
      <div class="t-dot"></div>
    </div>
  </div>
</div>
